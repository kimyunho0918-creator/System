<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>동아리 페스티벌 앱</title>
    <!-- 디자인 파일 연결 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 커스텀 모달 오버레이 -->
    <div class="modal-overlay" id="customModal">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle">알림</div>
            <div class="modal-message" id="modalMessage">메시지</div>
            
            <div id="modalSliderWrap" style="display:none;">
                <div id="modalSliderValue">1개</div>
                <input type="range" id="modalSlider" min="1" max="10" value="1">
            </div>

            <input type="text" id="modalInput" class="modal-input" placeholder="입력">
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modalCancelBtn">취소</button>
                <button class="modal-btn confirm" id="modalConfirmBtn">확인</button>
            </div>
        </div>
    </div>

    <!-- 관리자 패널 오버레이 -->
    <div class="modal-overlay" id="adminOverlay">
        <div class="modal-box" style="border-color: rgba(255,51,102,0.5); box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 15px rgba(255,51,102,0.1);">
            <div class="modal-title error" style="margin-bottom: 5px;">🛠️ 최고 관리자 패널</div>
            <p style="color:var(--text-dim); font-size:0.8rem; margin-bottom:20px;">데이터 강제 제어 시스템</p>
            
            <button class="modal-btn confirm danger" style="width:100%; margin-bottom:12px;" onclick="adminResetUser()">⚠️ 계정 완전 초기화 (로그아웃)</button>
            <button class="modal-btn confirm" style="width:100%; margin-bottom:12px;" onclick="adminResetStock()">📦 전체 상품 개인재고 복구</button>
            <button class="btn-game" style="width:100%; margin-bottom:20px;" onclick="adminAdjustPoints()">💸 포인트 강제 부여/차감</button>
            
            <button class="modal-btn cancel" style="width:100%;" onclick="closeAdminPanel()">닫기</button>
        </div>
    </div>

    <!-- 로그인 오버레이 -->
    <div id="loginOverlay">
        <div class="card" style="max-width: 400px; margin: auto; border-color: rgba(0,229,255,0.12);">
            <h1 style="font-family: 'Orbitron'; color: #00e5ff; margin-bottom: 30px; text-shadow: 0 0 8px rgba(0,229,255,0.4), 0 0 30px rgba(0,229,255,0.1);">FESTIVAL WALLET</h1>
            <input type="number" id="stuId" placeholder="학번 (예: 30101)" onkeypress="handleLoginEnter(event)">
            <input type="text" id="stuName" placeholder="이름" onkeypress="handleLoginEnter(event)">
            <button class="btn-primary" id="loginBtn" onclick="login()">접속하기</button>
        </div>
    </div>

    <header>
        <h1>FESTIVAL APP</h1>
        <button id="adminBtn" class="btn-admin-icon" onclick="openAdminPanel()" style="display: none;">⚙️</button>
    </header>

    <div class="content-area">
        <!-- 🏠 홈 화면 -->
        <div id="view-home" class="view-section active">
            <div class="card">
                <h3 id="userNameDisplay"></h3>
                <h3>현재 보유 포인트</h3>
                <span class="point-text" id="pointDisplay">0</span>
                <button onclick="logout()" style="background: #1e1e2a; border: 1px solid #333; padding: 8px 16px; font-size: 0.85rem; border-radius: 8px; color: #9999bb; margin-top: 15px; width: auto; box-shadow: none;">🔓 로그아웃</button>
            </div>
            <p style="text-align: center; font-size: 0.85rem; color: #888;">하단의 메뉴 탭을 눌러 이동하세요.</p>
        </div>

        <!-- 🎮 게임/점수 입력 화면 -->
        <div id="view-game" class="view-section">
            <div class="card" style="border-color: rgba(144,0,232,0.3);">
                <h3 style="color: #b44fff; font-weight: bold; border-bottom: 1px dashed #252535; padding-bottom: 10px; text-shadow: 0 0 6px rgba(180,79,255,0.3);">🎮 점수 획득 (운영자 전용)</h3>
                <select id="gameSelect" onchange="updateTierOptions()"></select>
                <select id="tierSelect"></select>
                <div id="slotPointInputWrap" style="display:none;">
                    <p style="font-size:0.82rem; color:#9999bb; margin: 0 0 8px; text-align:left;">🎰 직접 획득 포인트 입력 (최대 5,000P)</p>
                    <input type="number" id="slotPointInput" placeholder="획득 포인트 입력 (1 ~ 5000)" min="1" max="5000" onkeypress="handleGamePointEnter(event)">
                </div>
                <input type="password" id="gameAuthInput" placeholder="운영자 비밀번호" onkeypress="handleGamePointEnter(event)">
                <button class="btn-game" id="gameSubmitBtn" onclick="giveGamePoints()">포인트 지급</button>
            </div>
        </div>

        <!-- 🛒 상점 화면 -->
        <div id="view-shop" class="view-section">
            <h3 style="text-align: center; color: #ff9900;">상점 (보유: <span id="shopPointDisplay" style="color:#00ff88;">0</span>P)</h3>
            <p style="text-align: center; font-size: 0.8rem; color: #888;">원하시는 상품을 구매하시면 보관함으로 이동합니다.</p>
            <div class="shop-list" id="shopList"></div>
        </div>

        <!-- 🎒 보관함 화면 -->
        <div id="view-inv" class="view-section">
            <h3 style="text-align: center; color: #00e5ff;">내 보관함</h3>
            <p style="text-align: center; font-size: 0.8rem; color: #888;">상품 수령 시 운영자에게 보여주고 '사용'을 눌러주세요.</p>
            <div class="inventory-list" id="inventoryList"></div>
        </div>
    </div>

    <!-- 하단 네비게이션 탭 -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')" id="nav-home">🏠 홈</div>
        <div class="nav-item" onclick="switchTab('game')" id="nav-game">🎮 점수입력</div>
        <div class="nav-item" onclick="switchTab('shop')" id="nav-shop">🛒 상점</div>
        <div class="nav-item" onclick="switchTab('inv')" id="nav-inv">🎒 보관함</div>
    </div>

    <!-- 자바스크립트 파일 2개 순서대로 연결 -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
